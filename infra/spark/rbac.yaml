apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  namespace: test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: spark-role-binding
subjects:
  - kind: ServiceAccount
    name: spark
    namespace: test
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io