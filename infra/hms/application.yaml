apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hms
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/yijun-l/wiki-config.git
    targetRevision: main
    path: infra/hms
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: hms

  syncPolicy:
    automated:
      prune: false
      selfHeal: true

    syncOptions:
      - CreateNamespace=true