apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/yijun-l/wiki-config.git
    targetRevision: main
    path: infra/airflow
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: airflow

  syncPolicy:
    automated:
      enabled: false
      prune: false
      selfHeal: false

    syncOptions:
      - CreateNamespace=true
      - Prune=false